site:
  name: CinaGroup
  site: 'https://cinagroup.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: null

# Default SEO metadata
metadata:
  title:
    default: CinaGroup — AI & Web3 Solutions
    template: '%s — CinaGroup'
  description: "CinaGroup provides cutting-edge solutions in AI search (CinaSeek), intelligent robots (CinaClaw), skill platforms (CinaSkill), and blockchain infrastructure (CinaChain)."
  keywords:
    - "AI search"
    - "intelligent robot"
    - "blockchain"
    - "Web3"
    - "CinaSeek"
    - "CinaClaw"
    - "CinaSkill"
    - "CinaChain"
    - "automation"
    - "smart contracts"
  robots:
    index: true
    follow: true
  openGraph:
    site_name: CinaGroup
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
        alt: "CinaGroup - AI & Web3 Solutions"
    type: website
    locale: en_US
  twitter:
    handle: '@cinagroup'
    site: '@cinagroup'
    cardType: summary_large_image

# Favicon configuration
favicon:
  path: '/favicon.svg'
  # Use favicon SVG for consistency across browser tab and branding
  apple: '/favicon.svg'
  safari: '/favicon.svg'

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"
    splitbee:
      enabled: false # Set to true and add token for Splitbee analytics
      token: null

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
